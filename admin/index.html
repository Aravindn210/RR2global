<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - RR2 Global</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --bg-dark: #050505;
            --aqua-primary: #00D1B2;
            --card-glass: rgba(25, 25, 25, 0.6);
            --card-border: rgba(255, 255, 255, 0.08);
        }
        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            background-image: radial-gradient(circle at top right, rgba(0, 209, 178, 0.05), transparent 400px),
                              radial-gradient(circle at bottom left, rgba(0, 209, 178, 0.05), transparent 400px);
        }
        .login-card {
            background: var(--card-glass);
            border: 1px solid var(--card-border);
            padding: 45px 40px;
            border-radius: 25px;
            width: 100%;
            max-width: 380px;
            backdrop-filter: blur(20px);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .login-card img {
            height: 35px;
            margin-bottom: 25px;
        }
        .login-card h2 {
            font-size: 1.4rem;
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 1px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
        .form-group input {
            width: 100%;
            padding: 14px 15px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            border-color: var(--aqua-primary);
            background: rgba(0,0,0,0.5);
            box-shadow: 0 0 15px rgba(0, 209, 178, 0.1);
        }
        .password-container {
            position: relative;
        }
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 10;
        }
        .toggle-password:hover {
            color: var(--aqua-primary);
        }
        .btn-login {
            background: var(--aqua-primary);
            color: #000;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
        }
        .btn-login:hover {
            background: #fff;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 209, 178, 0.2);
        }
        .error-msg {
            color: #ff4757;
            background: rgba(255, 71, 87, 0.1);
            border: 1px solid rgba(255, 71, 87, 0.2);
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-top: 20px;
            display: none;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 35px 25px;
                border-radius: 20px;
            }
            .login-card h2 {
                font-size: 1.2rem;
                margin-bottom: 25px;
            }
            .form-group input {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="../assets/logo.png" alt="RR2 Global Admin">
        <h2>Secure Dashboard</h2>
        <form id="login-form">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter admin username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="password-container">
                    <input type="password" id="password" placeholder="Enter secure password" required>
                    <i class="fa-solid fa-eye toggle-password" id="togglePassword"></i>
                </div>
            </div>
            <button type="submit" class="btn-login">Access Dashboard</button>
            <div id="error-msg" class="error-msg"><i class="fa-solid fa-circle-exclamation me-2"></i> Incorrect credentials. Try again.</div>
        </form>
    </div>

    <!-- FontAwesome is now linked in the head -->

    <script>
        // Password Visibility Toggle
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', function() {
            // Toggle the type attribute
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            // Toggle the eye icon class
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });

        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            
            // Simple Frontend Authentication
            if (user === 'admin' && pass === 'rr2admin2026') {
                sessionStorage.setItem('rr2_auth', 'success');
                window.location.href = 'dashboard.html';
            } else {
                errorMsg.style.display = 'block';
                // Shake animation for error
                const card = document.querySelector('.login-card');
                card.style.transform = 'translate(-10px, 0)';
                setTimeout(() => card.style.transform = 'translate(10px, 0)', 100);
                setTimeout(() => card.style.transform = 'translate(-10px, 0)', 200);
                setTimeout(() => card.style.transform = 'translate(0, 0)', 300);
            }
        });
    </script>
</body>
</html>
