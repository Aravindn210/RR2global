<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | RR2 Global</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;600&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --primary: #48C6B6;
            --bg: #000000;
            --text: #ffffff;
            --text-muted: #888888;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden;
            background-image: radial-gradient(circle at top right, rgba(0, 209, 178, 0.05), transparent 400px),
                              radial-gradient(circle at bottom left, rgba(0, 209, 178, 0.05), transparent 400px);
        }
        .thank-you-card {
            padding: 40px;
            max-width: 500px;
        }
        .icon-check {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 2rem;
            animation: bounceIn 1s cubic-bezier(0.16, 1, 0.3, 1);
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 200;
            letter-spacing: 0.5rem;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }
        p {
            color: var(--text-muted);
            font-weight: 300;
            line-height: 1.8;
            margin-bottom: 2.5rem;
        }
        .btn-back {
            display: inline-block;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 1rem 2.5rem;
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.15rem;
            transition: all 0.3s ease;
        }
        .btn-back:hover {
            background: var(--primary);
            color: #000;
        }
        @keyframes bounceIn {
            0% { transform: scale(0); opacity: 0; }
            60% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="thank-you-card">
        <i class="fa-solid fa-circle-check icon-check"></i>
        <h1>Thank You</h1>
        <p>You have successfully subscribed to the RR2 Global newsletter. We'll keep you updated on our latest innovations in events, exhibitions, and interiors.</p>
        <a href="index.html" class="btn-back">Return Home</a>
    </div>
</body>
</html>
